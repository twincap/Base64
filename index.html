<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Base64 변환</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="app.js"></script>
</head>
<body>
  <div class="page-shell">
    <header class="topbar">
      <a class="brand" href="#top">Base64</a>
      <div class="mode-switch" role="tablist" aria-label="모드">
        <button class="mode-btn is-active" type="button" data-mode="decode">디코딩</button>
        <button class="mode-btn" type="button" data-mode="encode">인코딩</button>
      </div>
    </header>

    <main id="top" class="tool-grid">
      <section class="panel tool-card">
        <label class="field">
          <span class="field-label sr-only">입력</span>
          <textarea id="inputText" placeholder="입력"></textarea>
        </label>

        <div class="toolbar">
          <button id="transformBtn" class="button button-primary" type="button">디코딩</button>
          <button id="copyBtn" class="button button-secondary" type="button">복사</button>
          <button id="pasteBtn" class="button button-secondary" type="button">붙여넣기</button>
          <button id="clearBtn" class="button button-ghost" type="button">지우기</button>
        </div>

        <label class="field">
          <span class="field-label sr-only">결과</span>
          <textarea id="outputText" readonly placeholder="결과"></textarea>
        </label>

        <details class="advanced">
          <summary>옵션</summary>
          <div class="advanced-grid">
            <label class="check">
              <input id="liveMode" type="checkbox" checked />
              <span>라이브</span>
            </label>
            <label class="check">
              <input id="splitLines" type="checkbox" />
              <span>줄 단위</span>
            </label>
            <label class="field compact">
              <span class="field-label">문자 세트</span>
              <select id="charset">
                <option value="utf-8">UTF-8</option>
                <option value="latin1">Latin-1</option>
              </select>
            </label>
          </div>
        </details>

        <p id="statusText" class="status" role="status" aria-live="polite"></p>
      </section>

      <section class="panel file-card" aria-label="파일 변환">
        <header class="card-header">
          <p class="eyebrow">파일</p>
          <h2>파일 변환</h2>
          <p id="fileHint" class="card-sub">Base64 텍스트 파일을 선택하세요.</p>
        </header>

        <label class="file-drop" for="fileInput">
          <input id="fileInput" type="file" />
          <div class="file-drop-inner">
            <span class="file-drop-title">클릭하여 선택</span>
            <span class="file-drop-sub">또는 파일을 끌어다 놓기</span>
          </div>
        </label>

        <div class="file-meta">
          <span id="fileName">선택된 파일 없음</span>
          <span id="fileSize"></span>
        </div>

        <div class="file-actions">
          <button id="fileActionBtn" class="button button-primary" type="button">디코딩</button>
          <button id="fileClearBtn" class="button button-secondary" type="button">선택 해제</button>
        </div>
      </section>
    </main>
  </div>
</body>
</html>
